<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>제품 조회</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#B8860B;--gold-light:#D4A843;--gold-pale:#FDF6E3;--gold-border:#E8D5A3;
  --bg:#FAFAF8;--panel:#FFFFFF;--surface:#F5F3EE;
  --text:#1A1714;--text2:#6B6560;--text3:#9B9590;
  --border:#E8E4DC;--border2:#D4CEC4;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--panel);border-bottom:1px solid var(--border);padding:16px 20px;text-align:center;position:sticky;top:0;z-index:10}
.header-logo{font-size:11px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:2px}
.header-title{font-size:18px;font-weight:700;letter-spacing:-0.5px;color:var(--gold)}
.search-wrap{padding:24px 20px 16px}
.search-box{background:var(--panel);border:1px solid var(--border2);border-radius:var(--radius);padding:20px}
.search-label{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:10px;display:block}
.search-row{display:flex;gap:8px}
.search-row input{
  flex:1;padding:12px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);
  background:var(--surface);color:var(--text);font-size:16px;
  font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none
}
.search-row input:focus{border-color:var(--gold);background:var(--panel)}
.btn-search{
  padding:12px 18px;background:var(--gold);border:none;border-radius:var(--radius-sm);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:background .2s,transform .1s;white-space:nowrap
}
.btn-search:hover{background:var(--gold-light)}
.btn-search:active{transform:scale(0.97)}
.result-wrap{padding:0 20px 32px}
.result-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-img-wrap{width:100%;height:280px;background:var(--gold-pale);display:flex;align-items:center;justify-content:center;overflow:hidden}
.result-img-wrap img{width:100%;height:100%;object-fit:cover}
.result-img-placeholder{font-size:64px;opacity:.4}
.result-body{padding:20px}
.result-id{font-size:13px;color:var(--text2);margin-bottom:4px}
.result-model{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.result-price{font-size:32px;font-weight:700;color:var(--gold);margin-top:6px;letter-spacing:-1px}
.result-stones{font-size:13px;color:var(--text2);margin-top:8px}
.result-note{font-size:13px;color:var(--text2);margin-top:12px;line-height:1.7;padding-top:12px;border-top:1px solid var(--border)}
.result-updated{font-size:11px;color:var(--text3);margin-top:10px}
.not-found{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;color:var(--text2)}
.not-found-icon{font-size:40px;margin-bottom:12px;opacity:.3}
.not-found-text{font-size:14px;line-height:1.6}
.loading{text-align:center;padding:40px;color:var(--text2);font-size:14px}
.guide{background:var(--gold-pale);border:1px solid var(--gold-border);border-radius:var(--radius);padding:16px 18px}
.guide p{font-size:13px;color:#7A5C0A;line-height:1.7}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1A1714;color:#fff;padding:10px 20px;border-radius:24px;
  font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;
  pointer-events:none;white-space:nowrap;font-family:'Noto Sans KR',sans-serif
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-logo">Product Lookup</div>
    <div class="header-title">제품 조회</div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-label">제품 번호를 입력하세요</span>
      <div class="search-row">
        <input type="text" id="search-inp" placeholder="예: 10001" onkeydown="if(event.key==='Enter')doSearch()" autocomplete="off" />
        <button class="btn-search" onclick="doSearch()">조회</button>
      </div>
    </div>
  </div>
  <div class="result-wrap">
    <div id="result-area">
      <div class="guide">
        <p>제품 태그에 적힌 번호를 입력하시면<br>제품 사진과 가격을 확인하실 수 있습니다.</p>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwzsdweJGiRr900BTlLGYJVy2bGibg_JenSFoddT3mfOXs97oTtNJyGICmcPVrPSgccNg/exec';
const API_KEY = 'customer';

function doSearch(){
  const q = document.getElementById('search-inp').value.trim();
  const el = document.getElementById('result-area');
  if(!q){
    el.innerHTML='<div class="guide"><p>제품 번호를 입력하세요.</p></div>';
    return;
  }
  el.innerHTML='<div class="loading">조회 중...</div>';
  const url = API_URL+'?key='+encodeURIComponent(API_KEY)+'&action=lookup&model='+encodeURIComponent(q);
  fetch(url).then(r=>r.json()).then(data=>{
    if(data.status==='ok'){
      const p = data.data;
      const stones = [p.main_stone, p.sub_stone].filter(Boolean).join(', ');
      el.innerHTML=`
        <div class="result-card">
          <div class="result-img-wrap">
            ${p.photo
              ?`<img src="${p.photo}" alt="" onerror="this.parentElement.innerHTML='<div class=result-img-placeholder>💍</div>'">`
              :'<div class="result-img-placeholder">💍</div>'
            }
          </div>
          <div class="result-body">
            <div class="result-id">No. ${p.customer_id}</div>
            <div class="result-model">${p.category||''} ${stones?'— '+stones:''}</div>
            <div class="result-price">₩${Number(p.sale_price||0).toLocaleString()}</div>
            ${p.title?`<div class="result-stones" style="margin-top:8px;font-weight:500">${p.title}</div>`:''}
            ${p.artist?`<div class="result-stones">${p.artist}</div>`:''}
            ${p.description?`<div class="result-note">${p.description}</div>`:''}
            <div class="result-updated">업데이트: ${p.updated_date||''}</div>
          </div>
        </div>`;
    } else {
      el.innerHTML=`
        <div class="not-found">
          <div class="not-found-icon">💍</div>
          <div class="not-found-text">"${q}"에 해당하는<br>제품을 찾을 수 없습니다.</div>
        </div>`;
    }
  }).catch(()=>{
    el.innerHTML='<div class="not-found"><div class="not-found-icon">⚠️</div><div class="not-found-text">조회 실패. 다시 시도해 주세요.</div></div>';
  });
}
</script>
</body>
</html>
