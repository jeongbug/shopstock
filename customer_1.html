<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>제품 조회</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#B8860B;--gold-light:#D4A843;--gold-pale:#FDF6E3;--gold-border:#E8D5A3;
  --bg:#FAFAF8;--panel:#FFFFFF;--surface:#F5F3EE;
  --text:#1A1714;--text2:#6B6560;--text3:#9B9590;
  --border:#E8E4DC;--border2:#D4CEC4;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* 헤더 */
.header{
  background:var(--panel);border-bottom:1px solid var(--border);
  padding:16px 20px;text-align:center;position:sticky;top:0;z-index:10
}
.header-logo{font-size:11px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:2px}
.header-title{font-size:18px;font-weight:700;letter-spacing:-0.5px;color:var(--gold)}

/* 검색 영역 */
.search-wrap{padding:24px 20px 16px}
.search-box{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:var(--radius);padding:20px;
}
.search-label{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:10px;display:block}
.search-row{display:flex;gap:8px}
.search-row input{
  flex:1;padding:12px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);
  background:var(--surface);color:var(--text);font-size:16px;
  font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;
  -webkit-appearance:none
}
.search-row input:focus{border-color:var(--gold);background:var(--panel)}
.btn-search{
  padding:12px 18px;background:var(--gold);border:none;border-radius:var(--radius-sm);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:background .2s,transform .1s;
  white-space:nowrap
}
.btn-search:hover{background:var(--gold-light)}
.btn-search:active{transform:scale(0.97)}

/* 결과 */
.result-wrap{padding:0 20px 32px}

.result-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;animation:fadeUp .3s ease
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.result-img-wrap{width:100%;height:280px;background:var(--gold-pale);display:flex;align-items:center;justify-content:center;overflow:hidden}
.result-img-wrap img{width:100%;height:100%;object-fit:cover}
.result-img-placeholder{font-size:64px;opacity:.4}

.result-body{padding:20px}
.result-model{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.result-price{font-size:32px;font-weight:700;color:var(--gold);margin-top:6px;letter-spacing:-1px}
.result-note{
  font-size:13px;color:var(--text2);margin-top:12px;line-height:1.7;
  padding-top:12px;border-top:1px solid var(--border)
}
.result-updated{font-size:11px;color:var(--text3);margin-top:10px}

.not-found{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:40px 20px;text-align:center;color:var(--text2)
}
.not-found-icon{font-size:40px;margin-bottom:12px;opacity:.3}
.not-found-text{font-size:14px;line-height:1.6}

.loading{text-align:center;padding:40px;color:var(--text2);font-size:14px}

/* 안내 (초기 상태) */
.guide{
  background:var(--gold-pale);border:1px solid var(--gold-border);
  border-radius:var(--radius);padding:16px 18px;margin-bottom:0
}
.guide p{font-size:13px;color:#7A5C0A;line-height:1.7}

/* 설정 버튼 (숨겨진 관리자용) */
.admin-hint{
  text-align:center;margin-top:32px;padding-bottom:20px
}
.admin-hint a{font-size:11px;color:var(--text3);text-decoration:none;letter-spacing:0.3px}
.admin-hint a:hover{color:var(--text2)}

/* 설정 모달 */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  display:none;align-items:flex-end;justify-content:center
}
.modal-bg.open{display:flex}
.modal{
  background:var(--panel);border-radius:20px 20px 0 0;padding:24px;
  width:100%;max-width:480px
}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.form-group input{
  width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface);color:var(--text);font-size:14px;
  font-family:'Noto Sans KR',sans-serif;outline:none
}
.form-group input:focus{border-color:var(--gold)}
.btn-save{
  width:100%;padding:12px;background:var(--gold);border:none;border-radius:var(--radius-sm);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;margin-top:4px
}
.connect-status{font-size:12px;margin-top:8px;text-align:center;min-height:16px;font-weight:500}
.s-ok{color:#27AE60}.s-err{color:#C0392B}.s-loading{color:var(--text2)}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1A1714;color:#fff;padding:10px 20px;border-radius:24px;
  font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;
  pointer-events:none;white-space:nowrap;font-family:'Noto Sans KR',sans-serif
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-logo">Product Lookup</div>
    <div class="header-title">제품 조회</div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-label">모델번호를 입력하세요</span>
      <div class="search-row">
        <input type="text" id="search-inp" placeholder="예: RG-24K-001" onkeydown="if(event.key==='Enter')doSearch()" autocomplete="off" />
        <button class="btn-search" onclick="doSearch()">조회</button>
      </div>
    </div>
  </div>

  <div class="result-wrap">
    <div id="result-area">
      <div class="guide">
        <p>제품 태그에 적힌 모델번호를 입력하시면<br>제품 사진과 가격을 확인하실 수 있습니다.</p>
      </div>
    </div>

    <div class="admin-hint">
      <a href="#" onclick="openSettings();return false;">⚙</a>
    </div>
  </div>

  <!-- 관리자 설정 모달 (숨김) -->
  <div class="modal-bg" id="settings-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <p class="modal-title">연결 설정</p>
      <div class="form-group">
        <label>Apps Script URL</label>
        <input type="url" id="cfg-url" placeholder="https://script.google.com/macros/s/.../exec" />
      </div>
      <div class="form-group">
        <label>보안 키</label>
        <input type="password" id="cfg-key" placeholder="보안 키 입력" />
      </div>
      <button class="btn-save" onclick="saveSettings()">저장 및 테스트</button>
      <div class="connect-status" id="cfg-status"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
let cfg = JSON.parse(localStorage.getItem('jw_customer_cfg')||'{}');

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function openSettings(){
  if(cfg.url)document.getElementById('cfg-url').value=cfg.url;
  document.getElementById('settings-modal').classList.add('open');
}

function saveSettings(){
  const url=document.getElementById('cfg-url').value.trim();
  const key=document.getElementById('cfg-key').value.trim();
  const st=document.getElementById('cfg-status');
  if(!url||!key){st.className='connect-status s-err';st.textContent='URL과 보안 키를 입력하세요';return;}
  st.className='connect-status s-loading';st.textContent='테스트 중...';
  fetch(url+'?key='+encodeURIComponent(key)+'&action=getAll')
    .then(r=>r.json()).then(data=>{
      if(data.status==='ok'){
        cfg={url,key};
        localStorage.setItem('jw_customer_cfg',JSON.stringify(cfg));
        st.className='connect-status s-ok';st.textContent='✓ 연결 성공!';
        setTimeout(()=>document.getElementById('settings-modal').classList.remove('open'),800);
      } else {
        st.className='connect-status s-err';st.textContent='오류: '+(data.message||'실패');
      }
    }).catch(()=>{st.className='connect-status s-err';st.textContent='연결 실패';});
}

function doSearch(){
  const q=document.getElementById('search-inp').value.trim();
  const el=document.getElementById('result-area');
  if(!q){el.innerHTML='<div class="guide"><p>모델번호를 입력하세요.</p></div>';return;}
  if(!cfg.url||!cfg.key){
    el.innerHTML='<div class="not-found"><div class="not-found-icon">⚙️</div><div class="not-found-text">설정이 필요합니다.<br>하단 ⚙ 버튼을 눌러 연결 설정을 해주세요.</div></div>';
    return;
  }
  el.innerHTML='<div class="loading">조회 중...</div>';
  const url=cfg.url+'?key='+encodeURIComponent(cfg.key)+'&action=lookup&model='+encodeURIComponent(q);
  fetch(url).then(r=>r.json()).then(data=>{
    if(data.status==='ok'){
      const p=data.data;
      el.innerHTML=`
        <div class="result-card">
          <div class="result-img-wrap">
            ${p.img
              ?`<img src="${p.img}" alt="${p.model}" onerror="this.parentElement.innerHTML='<div class=result-img-placeholder>💍</div>'">`
              :'<div class="result-img-placeholder">💍</div>'
            }
          </div>
          <div class="result-body">
            <div class="result-model">${p.model}</div>
            <div class="result-price">₩${Number(p.price).toLocaleString()}</div>
            ${p.note?`<div class="result-note">${p.note}</div>`:''}
            <div class="result-updated">업데이트: ${p.updated}</div>
          </div>
        </div>`;
    } else {
      el.innerHTML=`
        <div class="not-found">
          <div class="not-found-icon">💍</div>
          <div class="not-found-text">"${q}"에 해당하는<br>제품을 찾을 수 없습니다.</div>
        </div>`;
    }
  }).catch(()=>{
    el.innerHTML='<div class="not-found"><div class="not-found-icon">⚠️</div><div class="not-found-text">조회 실패. 다시 시도해 주세요.</div></div>';
  });
}

document.getElementById('settings-modal').addEventListener('click',function(e){
  if(e.target===this)this.classList.remove('open');
});
</script>
</body>
</html>
