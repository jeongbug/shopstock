<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>재고 관리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#B8860B;--gold-light:#D4A843;--gold-pale:#FDF6E3;--gold-border:#E8D5A3;
  --bg:#FAFAF8;--panel:#FFFFFF;--surface:#F5F3EE;
  --text:#1A1714;--text2:#6B6560;--text3:#9B9590;
  --border:#E8E4DC;--border2:#D4CEC4;
  --red:#C0392B;--green:#27AE60;--blue:#2980B9;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

.login-screen{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-size:24px;font-weight:700;letter-spacing:-0.5px;color:var(--gold)}
.login-logo p{font-size:13px;color:var(--text2);margin-top:4px}
.login-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.login-card h2{font-size:15px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.form-group input,.form-group textarea,.form-group select{
  width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface);color:var(--text);font-size:14px;
  font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold)}
.form-group textarea{height:64px;resize:none;line-height:1.5}
.form-group .hint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.5}
.btn-primary{width:100%;padding:12px;background:var(--gold);border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .2s,transform .1s}
.btn-primary:hover{background:var(--gold-light)}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{background:#C4BAA8;cursor:not-allowed}
.login-status{font-size:12px;margin-top:10px;text-align:center;min-height:16px;font-weight:500}
.s-ok{color:var(--green)}.s-err{color:var(--red)}.s-loading{color:var(--text2)}

.nav-bar{display:flex;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.nav-btn{flex:1;padding:13px 4px 11px;font-size:11px;font-weight:500;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

.view{display:none;padding:16px;flex:1}
.view.active{display:block}
.page-title{font-size:17px;font-weight:700;margin-bottom:14px;letter-spacing:-0.3px}

.sheet-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.sheet-tab{padding:6px 14px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:20px;background:var(--panel);cursor:pointer;color:var(--text2);white-space:nowrap;font-family:'Noto Sans KR',sans-serif;transition:all .2s;flex-shrink:0}
.sheet-tab.active{background:var(--gold);color:#fff;border-color:var(--gold)}

/* 필터 */
.filter-bar{background:var(--surface);border-radius:var(--radius);padding:12px;margin-bottom:12px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-select{padding:6px 10px;font-size:12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--panel);color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--gold)}
.btn-filter-reset{padding:6px 10px;font-size:12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif}

/* 뷰 전환 */
.view-toggle{display:flex;gap:4px;margin-left:auto}
.view-toggle button{padding:5px 8px;font-size:12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--panel);cursor:pointer;color:var(--text2)}
.view-toggle button.active{background:var(--gold);color:#fff;border-color:var(--gold)}

.upload-area{border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:16px;text-align:center;cursor:pointer;background:var(--surface);color:var(--text2);font-size:13px;position:relative;transition:border-color .2s}
.upload-area:hover{border-color:var(--gold)}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-preview{width:100%;max-height:160px;object-fit:cover;border-radius:var(--radius-sm);margin-top:8px;display:none}
.compress-info{font-size:11px;color:var(--green);margin-top:4px;display:none}
.btn-reg{width:100%;padding:13px;background:var(--gold);border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:4px;transition:background .2s,transform .1s}
.btn-reg:hover{background:var(--gold-light)}
.btn-reg:disabled{background:#C4BAA8;cursor:not-allowed}

/* 목록 보기 */
.toolbar{display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.check-all{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
.toolbar-right{display:flex;gap:6px;margin-left:auto;align-items:center}
.btn-sm{padding:6px 10px;font-size:11px;font-weight:500;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--panel);cursor:pointer;color:var(--text);font-family:'Noto Sans KR',sans-serif;transition:background .15s;white-space:nowrap}
.btn-sm:hover{background:var(--surface)}
.sel-count{font-size:11px;color:var(--text2);white-space:nowrap}

.adjust-panel{background:var(--gold-pale);border:1px solid var(--gold-border);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.adjust-panel h3{font-size:12px;font-weight:700;color:#7A5C0A;margin-bottom:8px}
.adjust-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.adjust-row select,.adjust-row input[type=number]{padding:7px 8px;border:1px solid var(--gold-border);border-radius:var(--radius-sm);background:#fff;font-size:12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none}
.adjust-row select{flex:1}
.adjust-row input[type=number]{width:70px}
.btn-adjust{padding:7px 14px;background:var(--gold);border:none;border-radius:var(--radius-sm);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

/* 목록 아이템 */
.product-item{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--panel);margin-bottom:8px;transition:border-color .2s}
.product-item:hover{border-color:var(--border2)}
.p-check{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
.p-thumb{width:48px;height:48px;border-radius:var(--radius-sm);flex-shrink:0;overflow:hidden;background:var(--gold-pale);display:flex;align-items:center;justify-content:center;font-size:20px}
.p-thumb img{width:100%;height:100%;object-fit:cover}
.p-info{flex:1;min-width:0;cursor:pointer}
.p-id{font-size:13px;font-weight:700}
.p-factory{font-size:10px;color:var(--text3);font-family:monospace;margin-top:1px}
.p-price{font-size:12px;font-weight:700;color:var(--gold);margin-top:2px}
.p-note{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-actions{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.btn-edit{padding:4px 8px;font-size:11px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);cursor:pointer;color:var(--text);font-family:'Noto Sans KR',sans-serif}
.btn-del{padding:4px 8px;font-size:11px;border:1px solid #F5C6C6;border-radius:6px;background:transparent;cursor:pointer;color:var(--red);font-family:'Noto Sans KR',sans-serif}

/* 갤러리 보기 */
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.gallery-item{border:1px solid var(--border);border-radius:var(--radius);background:var(--panel);overflow:hidden;cursor:pointer;position:relative}
.gallery-item:hover{border-color:var(--border2)}
.gallery-check{position:absolute;top:6px;left:6px;width:18px;height:18px;accent-color:var(--gold);cursor:pointer;z-index:2}
.gallery-img{width:100%;height:130px;object-fit:cover;background:var(--gold-pale);display:flex;align-items:center;justify-content:center;font-size:28px}
.gallery-img img{width:100%;height:100%;object-fit:cover}
.gallery-body{padding:8px}
.gallery-id{font-size:12px;font-weight:700}
.gallery-price{font-size:12px;font-weight:700;color:var(--gold);margin-top:2px}
.gallery-badges{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}

.visible-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:4px}
.badge-y{background:#E8F5E9;color:#2E7D32}
.badge-n{background:#FFEBEE;color:#C62828}
.stock-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:4px}
.stock-ok{background:#E3F2FD;color:#1565C0}
.stock-no{background:#FFF3E0;color:#E65100}
.stock-end{background:#F3E5F5;color:#6A1B9A}

.empty-state,.loading-state{text-align:center;padding:40px 20px;color:var(--text2);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:.4}

/* 통계 */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700;color:var(--gold)}

/* 검색 */
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-bar input{flex:1;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--panel);font-size:14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none}
.search-bar input:focus{border-color:var(--gold)}
.btn-search{padding:9px 14px;background:var(--gold);border:none;border-radius:var(--radius-sm);color:#fff;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

/* 카탈로그 */
.catalog-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.catalog-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.catalog-item{border:1px solid var(--border);border-radius:var(--radius);background:var(--panel);overflow:hidden;position:relative}
.catalog-check{position:absolute;top:6px;left:6px;width:18px;height:18px;accent-color:var(--gold);z-index:2}
.catalog-img{width:100%;height:150px;object-fit:cover;background:var(--gold-pale);display:flex;align-items:center;justify-content:center;font-size:32px}
.catalog-img img{width:100%;height:100%;object-fit:cover}
.catalog-body{padding:10px}
.catalog-id{font-size:11px;color:var(--text2)}
.catalog-cat{font-size:12px;font-weight:500;margin-top:2px}
.catalog-price{font-size:15px;font-weight:700;color:var(--gold);margin-top:4px}
.catalog-note{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.4}
.btn-catalog-export{padding:8px 14px;background:var(--gold);border:none;border-radius:var(--radius-sm);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.catalog-price-toggle{display:flex;gap:6px;align-items:center}
.catalog-price-toggle label{font-size:12px;color:var(--text2)}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:12px}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);margin-top:-2px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-row .lbl{color:var(--text2);flex-shrink:0}
.detail-row .val{font-weight:500;text-align:right;word-break:break-all}
.factory-val{font-family:monospace;font-size:11px;color:#C07020;background:#FFF3E0;padding:2px 6px;border-radius:4px}
.price-val{color:var(--gold);font-size:15px;font-weight:700}
.modal-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.modal-actions button{flex:1;padding:9px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;color:var(--text);font-family:'Noto Sans KR',sans-serif;min-width:70px}
.modal-actions button:hover{background:var(--border)}
.modal-actions .btn-danger{border-color:#F5C6C6;color:var(--red);background:transparent}

.settings-link{font-size:11px;color:var(--text3);text-align:center;margin-top:12px;cursor:pointer;text-decoration:underline}
.role-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle}
.role-admin{background:#FFF3E0;color:#E65100}
.role-staff{background:#E3F2FD;color:#1565C0}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1714;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;font-family:'Noto Sans KR',sans-serif}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">

<div class="login-screen" id="login-screen">
  <div class="login-logo">
    <h1>재고 관리</h1>
    <p>내부 관리 시스템</p>
  </div>

  <!-- 로그인 전 금 시세 표시 -->
  <div style="background:var(--gold-pale);border:1px solid var(--gold-border);border-radius:var(--radius);padding:12px;margin-bottom:14px">
    <p style="font-size:12px;font-weight:700;color:var(--gold);margin-bottom:8px">💰 오늘 금 시세</p>
    <div id="login-gold-display" style="font-size:13px;color:var(--text2);text-align:center">불러오는 중...</div>
  </div>

  <div class="login-card">
    <h2>로그인</h2>
    <input type="hidden" id="cfg-url" value="https://script.google.com/macros/s/AKfycbzOZJk0T8BZS2OKfS8eYm5Ras0cqvnU8vjVIUQDhNdp9WkuU3jwjDHpgfOODV4kRm1MQw/exec" />
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="cfg-key" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="btn-primary" onclick="doLogin()">로그인</button>
    <div class="login-status" id="login-status"></div>
  </div>
</div>

<div id="main-screen" style="display:none;flex-direction:column;flex:1">
  <div style="background:var(--gold);padding:6px 16px;text-align:center">
    <span id="today-date" style="font-size:12px;color:#fff;font-weight:500"></span>
  </div>
  <div class="nav-bar">
    <button class="nav-btn active" onclick="switchNav('dashboard')">홈</button>
    <button class="nav-btn" onclick="switchNav('register')">등록</button>
    <button class="nav-btn" onclick="switchNav('list')">목록</button>
    <button class="nav-btn" onclick="switchNav('search')">검색</button>
    <button class="nav-btn" onclick="switchNav('catalog')">카탈로그</button>
  </div>

  <!-- 홈 -->
  <div class="view active" id="view-dashboard">
    <p class="page-title">대시보드 <span class="role-badge" id="role-badge"></span></p>
    
    <!-- 금 시세 -->
    <div id="gold-price-section" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <p style="font-size:13px;font-weight:700;color:var(--gold)">💰 오늘 금 시세</p>
        <button class="btn-sm" onclick="toggleGoldInput()">시세 입력</button>
      </div>
      <div id="gold-price-display" style="background:var(--gold-pale);border:1px solid var(--gold-border);border-radius:var(--radius);padding:12px">
        <div style="text-align:center;color:var(--text2);font-size:13px">불러오는 중...</div>
      </div>
      <!-- 시세 입력 폼 -->
      <div id="gold-input-form" style="display:none;margin-top:10px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px">
        <p style="font-size:12px;font-weight:700;margin-bottom:10px;color:var(--text2)">카톡 메시지 붙여넣기 또는 직접 입력</p>
        <div style="margin-bottom:10px">
          <textarea id="gold-paste" placeholder="카톡 메시지 붙여넣기..." style="width:100%;height:80px;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Noto Sans KR',sans-serif;resize:none" oninput="parseGoldMessage()"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px">
          <div class="form-group" style="margin:0">
            <label style="font-size:11px">순금 매입 (원/g)</label>
            <input type="text" id="g-gold-buy" placeholder="예: 120.000" />
          </div>
          <div class="form-group" style="margin:0">
            <label style="font-size:11px">순금 판매 (원/g)</label>
            <input type="text" id="g-gold-sell" placeholder="예: 125.000" />
          </div>
          <div class="form-group" style="margin:0">
            <label style="font-size:11px">14K 매입 (원/g)</label>
            <input type="text" id="g-k14-buy" placeholder="예: 85.000" />
          </div>
          <div class="form-group" style="margin:0">
            <label style="font-size:11px">18K 매입 (원/g)</label>
            <input type="text" id="g-k18-buy" placeholder="예: 100.000" />
          </div>
          <div class="form-group" style="margin:0">
            <label style="font-size:11px">은수저 99% 매입</label>
            <input type="text" id="g-silver-buy" placeholder="예: 1.500" />
          </div>
          <div class="form-group" style="margin:0">
            <label style="font-size:11px">백금 99% 매입</label>
            <input type="text" id="g-platinum-buy" placeholder="예: 45.000" />
          </div>
        </div>
        <button class="btn-primary" onclick="saveGoldPrice()">시세 저장</button>
      </div>
    </div>

    <div class="stats-grid" id="stats-grid"></div>
    <p class="settings-link" onclick="showLogin()">⚙ 연결 설정 변경</p>
  </div>

  <!-- 등록 -->
  <div class="view" id="view-register">
    <p class="page-title">제품 등록</p>
    <div class="sheet-tabs" id="reg-tabs">
      <div class="sheet-tab active" onclick="selectRegSheet(this,'Rokuzan')">Rokuzan</div>
      <div class="sheet-tab" onclick="selectRegSheet(this,'Own_Products')">사입/자체제작</div>
      <div class="sheet-tab" onclick="selectRegSheet(this,'Artwork')">태국그림</div>
      <div class="sheet-tab" onclick="selectRegSheet(this,'Gemstones')">원석</div>
    </div>
    <div id="reg-form"></div>
  </div>

  <!-- 목록 -->
  <div class="view" id="view-list">
    <p class="page-title">재고 목록</p>
    <div class="sheet-tabs" id="list-tabs">
      <div class="sheet-tab active" onclick="selectListSheet(this,'Rokuzan')">Rokuzan</div>
      <div class="sheet-tab" onclick="selectListSheet(this,'Own_Products')">사입/자체제작</div>
      <div class="sheet-tab" onclick="selectListSheet(this,'Artwork')">태국그림</div>
      <div class="sheet-tab" onclick="selectListSheet(this,'Gemstones')">원석</div>
    </div>

    <!-- 필터 -->
    <div class="filter-bar" id="filter-bar"></div>

    <div class="adjust-panel" id="adjust-panel" style="display:none">
      <h3>가격 일괄 조정</h3>
      <div class="adjust-row">
        <select id="adj-type">
          <option value="pct-up">% 인상</option>
          <option value="pct-down">% 인하</option>

      <button id="catalog-wholesale-btn" onclick="selectCatalogChannel('wholesale')" style="flex:1;padding:9px;font-size:13px;font-weight:700;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--panel);color:var(--text2);cursor:pointer">도매 카탈로그</button>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>

    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
</div>

<script>
let cfg = JSON.parse(localStorage.getItem('jw_admin_cfg')||'{}');
let userRole = '';
let currentSheet = 'Rokuzan';
let currentRegSheet = 'Rokuzan';
let currentCatalogSheet = 'Rokuzan';
let products = [];
let filteredProducts = [];
let searchResults = [];
let adjVisible = false;
let viewMode = 'list';

const CATEGORIES = {
  'Rokuzan': ['목걸이','귀걸이','반지','브로치','팔찌','펜던트','변형'],
  'Own_Products': ['실버_목걸이','실버_귀걸이','실버_반지','실버_브로치','실버_팔찌','실버_펜던트','골드_목걸이','골드_귀걸이','골드_반지','골드_브로치','골드_팔찌','골드_펜던트','변형'],
  'Artwork': ['그림'],
  'Gemstones': ['원석']
};

let stonesCache = [];

function loadStones(){
  api({action:'getStones'}).then(data=>{
    if(data.status==='ok'){
      stonesCache=data.data;
      updateStoneDropdowns();
      if(userRole==='admin'){
        const g=document.getElementById('new-stone-group');
        if(g)g.style.display='block';
      }
    }
  });
}

function updateStoneDropdowns(){
  const ids=['reg-main-stone','reg-sub-stone'];
  ids.forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    const firstOpt=el.options[0].cloneNode(true);
    el.innerHTML='';
    el.appendChild(firstOpt);
    stonesCache.forEach(s=>{
      const o=document.createElement('option');
      o.value=s.name_kr;
      o.textContent=s.name_kr+(s.category?` (${s.category})`:'');
      el.appendChild(o);
    });
  });
}

function addNewStone(){
  const kr=document.getElementById('new-stone-kr').value.trim();
  const en=document.getElementById('new-stone-en').value.trim();
  if(!kr){showToast('한글 이름을 입력하세요');return;}
  api({action:'addStone',name_kr:kr,name_en:en}).then(data=>{
    if(data.status==='ok'){
      showToast('✓ 스톤 추가 완료');
      document.getElementById('new-stone-kr').value='';
      document.getElementById('new-stone-en').value='';
      loadStones();
    }
  });
}

let metalsCache=[];
let platingsCache=[];

function loadMaterials(){
  api({action:'getMetals'}).then(data=>{
    if(data.status==='ok'){
      metalsCache=data.data;
      updateBaseDropdown();
    }
  });
  api({action:'getPlatings'}).then(data=>{
    if(data.status==='ok'){
      platingsCache=data.data;
      updatePlatingDropdown();
    }
  });
  if(userRole==='admin'){
    const g=document.getElementById('new-material-group');
    if(g)g.style.display='block';
  }
}

function updateBaseDropdown(){
  const el=document.getElementById('reg-base-material');
  if(!el)return;
  el.innerHTML='<option value="">선택...</option>';
  metalsCache.forEach(m=>{
    const o=document.createElement('option');
    o.value=m.name;o.textContent=m.name;
    el.appendChild(o);
  });
}

function updatePlatingDropdown(){
  const el=document.getElementById('reg-plating');
  if(!el)return;
  el.innerHTML='<option value="없음">없음</option>';
  platingsCache.forEach(m=>{
    const o=document.createElement('option');
    o.value=m.name;o.textContent=m.name;
    el.appendChild(o);
  });
}

function addNewMaterial(){
  const name=document.getElementById('new-material-name').value.trim();
  const type=document.getElementById('new-material-type').value;
  if(!name){showToast('소재명을 입력하세요');return;}
  const action=type==='순금속'?'addMetal':'addPlating';
  api({action,name}).then(data=>{
    if(data.status==='ok'){
      showToast('✓ 소재 추가 완료');
      document.getElementById('new-material-name').value='';
      loadMaterials();
    }
  });
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function api(params){
  const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v||'')).join('&');
  return fetch(cfg.url+'?key='+encodeURIComponent(cfg.key)+'&'+qs).then(r=>r.json());
}

function doLogin(){
  const url=document.getElementById('cfg-url').value.trim();
  const key=document.getElementById('cfg-key').value.trim();
  const st=document.getElementById('login-status');
  if(!url||!key){st.className='login-status s-err';st.textContent='URL과 비밀번호를 입력하세요';return;}
  st.className='login-status s-loading';st.textContent='로그인 중...';
  fetch(url+'?key='+encodeURIComponent(key)+'&action=getRole')
    .then(r=>r.json()).then(roleData=>{
      if(roleData.status==='ok'){
        userRole=roleData.role;
        cfg={url,key};
        localStorage.setItem('jw_admin_cfg',JSON.stringify(cfg));
        fetch(url+'?key='+encodeURIComponent(key)+'&action=getStats')
          .then(r=>r.json()).then(data=>{
            if(data.status==='ok') showMain(data.data);
          });
      } else {
        st.className='login-status s-err';st.textContent='비밀번호가 틀렸습니다';
      }
    }).catch(()=>{
      st.className='login-status s-err';st.textContent='연결 실패. URL을 확인하세요';
    });
}

function showMain(stats){
  document.getElementById('login-screen').style.display='none';
  const ms=document.getElementById('main-screen');
  ms.style.display='flex';ms.style.flexDirection='column';
  renderStats(stats);
  renderRegForm(currentRegSheet);
}

function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-screen').style.display='none';
  if(cfg.url)document.getElementById('cfg-url').value=cfg.url;
}

function switchNav(v){
  document.querySelectorAll('.nav-btn').forEach((b,i)=>
    b.classList.toggle('active',['dashboard','register','list','search','catalog'][i]===v));
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(v==='list')loadList();
  if(v==='dashboard')loadStats();
  if(v==='catalog')loadCatalog();
  if(v==='register'){loadStones();loadMaterials();}
}

function loadStats(){
  api({action:'getStats'}).then(data=>{
    if(data.status==='ok')renderStats(data.data);
  });
  loadGoldPrice();
}

function renderStats(stats){
  const badge=document.getElementById('role-badge');
  badge.className='role-badge '+(userRole==='admin'?'role-admin':'role-staff');
  badge.textContent=userRole==='admin'?'관리자':'직원';
  const el=document.getElementById('stats-grid');
  const items=[
    {key:'Rokuzan',label:'Rokuzan'},
    {key:'Own_Products',label:'사입/자체제작'},
    {key:'Artwork',label:'태국그림'},
    {key:'Gemstones',label:'원석'}
  ];
  el.innerHTML=items.map(it=>`
    <div class="stat-card">
      <div class="stat-label">${it.label}</div>
      <div class="stat-value">${stats[it.key]||0}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">개 등록</div>
    </div>`).join('');
}

// ================================
// 등록 폼
// ================================
function selectRegSheet(el,sheet){
  document.querySelectorAll('#reg-tabs .sheet-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentRegSheet=sheet;
  renderRegForm(sheet);
  setTimeout(()=>{
    if(sheet==='Own_Products'){
      updateBaseDropdown();
      updatePlatingDropdown();
      if(userRole==='admin'){
        const g=document.getElementById('new-material-group');
        if(g)g.style.display='block';
      }
    }
    if(sheet==='Rokuzan'||sheet==='Own_Products'){
      updateStoneDropdowns();
    }
  },100);
}

function renderRegForm(sheet){
  const cats=CATEGORIES[sheet]||[];
  let html=`
    <div class="form-group">
      <label>분류</label>
      <select id="reg-category">${cats.map(c=>`<option>${c}</option>`).join('')}</select>
    </div>
    <div class="form-group">
      <label>공장번호 / 원본번호</label>
      <input type="text" id="reg-factory" placeholder="제조사 원본 번호" />
      <p class="hint">고객에게 노출되지 않습니다</p>
    </div>`;

  if(sheet==='Rokuzan'){
    html+=`
      <div class="form-group">
        <label>중심스톤</label>
        <select id="reg-main-stone"><option value="">선택...</option></select>
      </div>
      <div class="form-group">
        <label>보조스톤</label>
        <select id="reg-sub-stone"><option value="">없음</option></select>
      </div>
      <div class="form-group" id="new-stone-group" style="display:none">
        <label>새 스톤 추가 (관리자만)</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="new-stone-kr" placeholder="한글 이름" style="flex:1" />
          <input type="text" id="new-stone-en" placeholder="영문" style="flex:1" />
          <button onclick="addNewStone()" style="padding:8px 12px;background:var(--gold);border:none;border-radius:var(--radius-sm);color:#fff;cursor:pointer;font-size:12px">추가</button>
        </div>
      </div>
      <div class="form-group"><label>세트번호</label><input type="text" id="reg-set-number" placeholder="세트 구성시 입력" /></div>
      <div class="form-group"><label>변형 원본번호</label><input type="text" id="reg-original-id" placeholder="변형 제품일 경우 원본 고객번호" /></div>
      <div class="form-group"><label>변형 내용</label><input type="text" id="reg-modify-desc" placeholder="예: 귀걸이→브로치 2개" /></div>`;
  }

  if(sheet==='Own_Products'){
    html+=`
      <div class="form-group"><label>브랜드</label><input type="text" id="reg-brand" placeholder="브랜드명" /></div>
      <div class="form-group">
        <label>베이스 소재</label>
        <select id="reg-base-material"><option value="">선택...</option></select>
      </div>
      <div class="form-group">
        <label>도금</label>
        <select id="reg-plating"><option value="없음">없음</option></select>
      </div>
      <div class="form-group" id="new-material-group" style="display:none">
        <label>새 소재 추가 (관리자만)</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input type="text" id="new-material-name" placeholder="소재명" style="flex:1" />
          <select id="new-material-type" style="padding:8px">
            <option value="순금속">순금속</option>
            <option value="도금">도금</option>
          </select>
          <button onclick="addNewMaterial()" style="padding:8px 12px;background:var(--gold);border:none;border-radius:var(--radius-sm);color:#fff;cursor:pointer;font-size:12px">추가</button>
        </div>
      </div>
      <div class="form-group"><label>도매가 (₩)</label><input type="number" id="reg-wholesale-price" placeholder="0" /></div>
      <div class="form-group"><label>원가 (₩)</label><input type="number" id="reg-cost-price" placeholder="0" /><p class="hint">내부용</p></div>
      <div class="form-group"><label>주문서 참조번호</label><input type="text" id="reg-order-ref" placeholder="예: PO-2024-001" /></div>
      <div class="form-group">
        <label>추가사진 (다각도, 착용샷)</label>
        <div class="upload-area">
          <span id="upload-label-images">📷 여러 장 선택 가능</span>
          <input type="file" accept="image/*" multiple onchange="handleMultipleImages(this,'images')" />
        </div>
      </div>
      <div class="form-group">
        <label>문서 (주문서, 영수증)</label>
        <div class="upload-area">
          <span id="upload-label-docs">📄 문서 선택</span>
          <input type="file" accept="image/*,application/pdf" multiple onchange="handleMultipleImages(this,'documents')" />

  if(sheet==='Artwork'){

          <option>정식 보증서</option>

          <option>없음</option>

      </div>`;
  }

  if(sheet==='Gemstones'){
    html+=`

        <img id="upload-preview" class="upload-preview" />

    <div class="form-group">
      <label>소매 노출</label>
      <select id="reg-visible-retail">
        <option value="N">숨김</option>

      <select id="reg-visible-wholesale">
        <option value="N">숨김</option>
        <option value="Y">노출</option>
      </select>
    </div>
    <button class="btn-reg" id="btn-reg" onclick="registerProduct()">등록하기</button>`;

  document.getElementById('reg-form').innerHTML=html;

let compressedImageBase64='';
let extraImages={};

function handleImage(inp){
  if(!inp.files[0])return;
  const file=inp.files[0];
  const originalSize=(file.size/1024).toFixed(0);
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=800;
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=h*(MAX/w);w=MAX;}}
      else{if(h>MAX){w=w*(MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.75);
      compressedImageBase64=compressed;
      const compSize=((compressed.length*3/4)/1024).toFixed(0);
      const prev=document.getElementById('upload-preview');
      prev.src=compressed;prev.style.display='block';
      document.getElementById('upload-label').textContent='✓ 사진 선택됨';
      const info=document.getElementById('compress-info');
      info.textContent=`압축: ${originalSize}KB → ${compSize}KB`;
      info.style.display='block';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function handleMultipleImages(inp,field){
  if(!inp.files.length)return;
  const files=Array.from(inp.files);
  const labelId=field==='images'?'upload-label-images':'upload-label-docs';
  document.getElementById(labelId).textContent=`✓ ${files.length}개 선택됨`;
  extraImages[field]=[];
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      if(file.type.startsWith('image/')){
        const img=new Image();
        img.onload=()=>{
          const canvas=document.createElement('canvas');
          const MAX=800;
          let w=img.width,h=img.height;
          if(w>h){if(w>MAX){h=h*(MAX/w);w=MAX;}}
          else{if(h>MAX){w=w*(MAX/h);h=MAX;}}
          canvas.width=w;canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          extraImages[field].push(canvas.toDataURL('image/jpeg',0.75));
        };
        img.src=e.target.result;
      } else {
        extraImages[field].push(e.target.result);
      }
    };
    reader.readAsDataURL(file);
  });
}

function parseGoldMessage(){
  const text=document.getElementById('gold-paste').value;
  if(!text)return;

  // 숫자 패턴 추출 (xxx.xxx 형식)
  const nums=text.match(/\d{1,3}\.\d{3}/g)||[];

  // 매입/판매 키워드로 찾기
  const lines=text.split('\n');
  lines.forEach(line=>{
    const n=line.match(/\d{1,3}\.\d{3}/);
    if(!n)return;
    const val=n[0];
    if(line.includes('판매')&&!line.includes('14')&&!line.includes('18')){
      document.getElementById('g-gold-sell').value=val;
    } else if(line.includes('매입')&&!line.includes('14')&&!line.includes('18')&&!line.includes('은')&&!line.includes('백금')){
      document.getElementById('g-gold-buy').value=val;

      document.getElementById('g-k14-buy').value=val;
    } else if(line.includes('18')){
      document.getElementById('g-k18-buy').value=val;
    } else if(line.includes('은')){
      document.getElementById('g-silver-buy').value=val;
    } else if(line.includes('백금')){
      document.getElementById('g-platinum-buy').value=val;
    }
  });
}

function getFilterVal(id){const el=document.getElementById(id);return el?el.value:'';}

function applyFilters(){
  let result=[...products];

  const cat=getFilterVal('f-category');
  const stone=getFilterVal('f-stone');
  const material=getFilterVal('f-material');
  const artist=getFilterVal('f-artist');
  const size=getFilterVal('f-size');
  const mineral=getFilterVal('f-mineral');
  const variety=getFilterVal('f-variety');
  const stock=getFilterVal('f-stock');
  const visible=getFilterVal('f-visible');
  const sort=getFilterVal('f-sort');

  if(cat) result=result.filter(p=>p.category&&p.category.includes(cat));
  if(stone) result=result.filter(p=>p.main_stone===stone||p.sub_stone===stone);
  if(material) result=result.filter(p=>p.category&&p.category.startsWith(material));
  if(artist) result=result.filter(p=>p.artist===artist);
  if(size) result=result.filter(p=>p.size===size);
  if(mineral) result=result.filter(p=>p.mineral_type===mineral);
  if(variety) result=result.filter(p=>p.variety===variety);
  if(stock) result=result.filter(p=>p.stock_status===stock);
  if(visible){
    const [type,val]=visible.split('_');
    if(type==='retail') result=result.filter(p=>p.visible_retail===val);
    else if(type==='wholesale') result=result.filter(p=>p.visible_wholesale===val);
  }

  if(sort==='price-asc') result.sort((a,b)=>Number(a.sale_price||0)-Number(b.sale_price||0));
  else if(sort==='price-desc') result.sort((a,b)=>Number(b.sale_price||0)-Number(a.sale_price||0));
  else if(sort==='id-asc') result.sort((a,b)=>Number(a.customer_id)-Number(b.customer_id));
  else if(sort==='id-desc') result.sort((a,b)=>Number(b.customer_id)-Number(a.customer_id));

  filteredProducts=result.map(p=>({...p,selected:false}));
  renderProductItems(filteredProducts);
  document.getElementById('sel-count').textContent=`${filteredProducts.length}개 (전체 ${products.length}개)`;
}

function resetFilters(){
  document.querySelectorAll('.filter-select').forEach(el=>el.value='');
  applyFilters();
}

function applyAdjust(){
  const type=document.getElementById('adj-type').value;
  const field=document.getElementById('adj-field').value;
  const val=parseFloat(document.getElementById('adj-val').value);
  const targets=filteredProducts.filter(p=>p.selected);
  if(!targets.length){showToast('제품을 먼저 선택하세요');return;}
  if(!val||isNaN(val)){showToast('조정값을 입력하세요');return;}
  const ids=targets.map(p=>p.customer_id).join(',');
  api({action:'adjustPrice',sheet:currentSheet,ids,type,value:val,price_field:field})
    .then(data=>{
      if(data.status==='ok'){showToast('✓ '+data.updated+'개 가격 조정 완료');loadList();}
    });
}

function batchVisible(channel,val){
  if(userRole!=='admin'){showToast('관리자만 가능합니다');return;}
  const targets=filteredProducts.filter(p=>p.selected);
  if(!targets.length){showToast('제품을 먼저 선택하세요');return;}
  const field=channel==='retail'?'visible_retail':'visible_wholesale';
  let done=0;
  targets.forEach(p=>{
    const params={action:'updateProduct',sheet:currentSheet,id:p.customer_id};
    params[field]=val;
    api(params).then(()=>{
      done++;
      if(done===targets.length){
        showToast(`✓ ${done}개 ${channel==='retail'?'소매':'도매'} ${val==='Y'?'노출':'숨김'} 처리`);
        loadList();
      }
    });
  });
}

function openDetail(id){
  const arr=filteredProducts.length?filteredProducts:products;
  const p=arr.find(x=>String(x.customer_id)===String(id));
  if(!p)return;
  document.getElementById('modal-title').textContent=p.customer_id;
  const fields=[
    {l:'고객번호',v:p.customer_id},
    {l:'공장번호',v:p.factory_id,cls:'factory-val'},
    {l:'분류',v:p.category},
    {l:'소비자가',v:p.sale_price?'₩'+Number(p.sale_price).toLocaleString():'',cls:'price-val'},
    {l:'도매가',v:p.wholesale_price?'₩'+Number(p.wholesale_price).toLocaleString():''},
    {l:'팝업가',v:p.popup_price?'₩'+Number(p.popup_price).toLocaleString():''},
    {l:'원가',v:p.cost_price?'₩'+Number(p.cost_price).toLocaleString():''},
    {l:'중심스톤',v:p.main_stone},{l:'보조스톤',v:p.sub_stone},
    {l:'세트번호',v:p.set_number},{l:'원본번호',v:p.original_id},{l:'변형내용',v:p.modify_desc},
    {l:'브랜드',v:p.brand},{l:'소재',v:p.material},
    {l:'작품명',v:p.title},{l:'작가',v:p.artist},{l:'사용보석',v:p.gems_used},
    {l:'크기',v:p.size||p.size_weight},{l:'보증서',v:p.certificate},
    {l:'광물종류',v:p.mineral_type},{l:'품종',v:p.variety},{l:'산지',v:p.origin},
    {l:'재고수량',v:p.stock_quantity},{l:'주문서',v:p.order_ref},
    {l:'재고상태',v:p.stock_status},
    {l:'소매 노출',v:p.visible_retail==='Y'?'노출중':'숨김'},
    {l:'도매 노출',v:p.visible_wholesale==='Y'?'노출중':'숨김'},
    {l:'업데이트',v:p.updated_date},
  ].filter(f=>f.v&&f.v!=='0'&&f.v!==0);

  document.getElementById('modal-body').innerHTML=`
    ${p.photo?`<img src="${p.photo}" style="width:100%;height:160px;object-fit:cover;border-radius:10px;margin-bottom:10px" onerror="this.style.display='none'" alt="">`:''}
    ${fields.map(f=>`<div class="detail-row"><span class="lbl">${f.l}</span><span class="val ${f.cls||''}">${f.v}</span></div>`).join('')}
    ${p.description?`<div style="margin-top:8px;font-size:12px;color:var(--text2);line-height:1.6;padding-bottom:8px;border-bottom:1px solid var(--border)">${p.description}</div>`:''}
    <div class="modal-actions">
      ${userRole==='admin'?`
        <button onclick="toggleVisible('${p.customer_id}','retail')">소매 ${p.visible_retail==='Y'?'숨기기':'보이기'}</button>
        <button onclick="toggleVisible('${p.customer_id}','wholesale')">도매 ${p.visible_wholesale==='Y'?'숨기기':'보이기'}</button>
        <button onclick="editField('${p.customer_id}','sale_price','소비자가',${p.sale_price||0})">가격 수정</button>
      `:''}
      <button onclick="editField('${p.customer_id}','description','메모','${(p.description||'').replace(/'/g,"\\'")}')">메모 수정</button>
      ${userRole==='admin'?`<button class="btn-danger" onclick="deleteProduct('${p.customer_id}')">삭제</button>`:''}
    </div>`;
  document.getElementById('modal').classList.add('open');
}

function toggleVisible(id,channel){
  const p=filteredProducts.find(x=>String(x.customer_id)===String(id));
  if(!p)return;
  const field=channel==='retail'?'visible_retail':'visible_wholesale';
  const current=p[field];
  const newVal=current==='Y'?'N':'Y';
  const params={action:'updateProduct',sheet:currentSheet,id};
  params[field]=newVal;
  api(params).then(data=>{
    if(data.status==='ok'){closeModal();loadList();showToast(`${channel==='retail'?'소매':'도매'} 노출 변경`);}
  });
}

function editField(id,field,label,current){
  const val=prompt(label+' 수정',current);
  if(val===null)return;
  const params={action:'updateProduct',sheet:currentSheet,id};
  params[field]=val;
  api(params).then(data=>{
    if(data.status==='ok'){closeModal();loadList();showToast('✓ 수정 완료');}
  });
}

function deleteProduct(id){
  if(!confirm('삭제할까요? 복구 불가능합니다.'))return;
  api({action:'deleteProduct',sheet:currentSheet,id})
    .then(data=>{
      if(data.status==='ok'){closeModal();loadList();showToast('✓ 삭제 완료');}
    });
}

function closeModal(){document.getElementById('modal').classList.remove('open')}

// ================================
// 검색
// ================================
function doSearch(){
  const q=document.getElementById('search-inp').value.trim();
  const el=document.getElementById('search-result');
  if(!q){el.innerHTML='';document.getElementById('search-result-toolbar').style.display='none';return;}
  el.innerHTML='<div class="loading-state">검색 중...</div>';
  api({action:'lookup',model:q}).then(data=>{
    if(data.status==='ok'){
      const p=data.data;
      const sheet=data.sheet||'';
      searchResults=[{...p,selected:false,_sheet:sheet}];
      document.getElementById('search-result-toolbar').style.display='block';
      el.innerHTML=`
        <div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
          <div style="position:relative">
            <input type="checkbox" style="position:absolute;top:8px;left:8px;width:18px;height:18px;accent-color:var(--gold);z-index:2" onchange="searchResults[0].selected=this.checked" />
            ${p.photo?`<img src="${p.photo}" style="width:100%;height:200px;object-fit:cover" onerror="this.style.display='none'" alt="">`:''}
          </div>
          <div style="padding:14px">
            <div style="font-size:16px;font-weight:700">${p.customer_id}
              <span class="visible-badge ${p.visible_retail==='Y'?'badge-y':'badge-n'}">소매${p.visible_retail==='Y'?'노출':'숨김'}</span>
              <span class="visible-badge ${p.visible_wholesale==='Y'?'badge-y':'badge-n'}">도매${p.visible_wholesale==='Y'?'노출':'숨김'}</span>
            </div>
            <div style="font-size:11px;color:var(--text3);font-family:monospace;margin-top:2px">${p.factory_id||''}</div>
            <div style="font-size:20px;font-weight:700;color:var(--gold);margin-top:4px">₩${Number(p.sale_price||0).toLocaleString()}</div>
            ${p.description?`<div style="font-size:13px;color:var(--text2);margin-top:8px;line-height:1.5">${p.description}</div>`:''}
            <div style="font-size:11px;color:var(--text3);margin-top:8px">시트: ${sheet}</div>
            ${userRole==='admin'?`
            <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
              <button class="btn-sm" onclick="searchToggleVisible('${p.customer_id}','${sheet}','retail')">소매 ${p.visible_retail==='Y'?'숨기기':'보이기'}</button>
              <button class="btn-sm" onclick="searchToggleVisible('${p.customer_id}','${sheet}','wholesale')">도매 ${p.visible_wholesale==='Y'?'숨기기':'보이기'}</button>
              <button class="btn-sm" onclick="searchEditPrice('${p.customer_id}','${sheet}',${p.sale_price||0})">가격 수정</button>
            </div>`:''}
          </div>
        </div>`;
    } else {
      document.getElementById('search-result-toolbar').style.display='none';
      el.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div>"${q}" 검색 결과 없음</div>`;
    }
  }).catch(()=>{el.innerHTML='<div class="empty-state">검색 실패</div>';});
}

function searchSelectAll(cb){searchResults.forEach(p=>p.selected=cb.checked);}

function searchToggleVisible(id,sheet,channel){
  const field=channel==='retail'?'visible_retail':'visible_wholesale';
  const p=searchResults[0];
  const current=p?p[field]:'N';
  const newVal=current==='Y'?'N':'Y';
  const params={action:'updateProduct',sheet,id};
  params[field]=newVal;
  api(params).then(data=>{
    if(data.status==='ok'){showToast(`${channel==='retail'?'소매':'도매'} 노출 변경`);doSearch();}
  });
}

function searchEditPrice(id,sheet,current){
  const val=prompt('새 소비자가 입력',current);
  if(val===null)return;
  api({action:'updateProduct',sheet,id,sale_price:val}).then(data=>{
    if(data.status==='ok'){showToast('✓ 가격 수정 완료');doSearch();}
  });
}

function searchBatchVisible(channel,val){
  const targets=searchResults.filter(p=>p.selected);
  if(!targets.length){showToast('제품을 먼저 선택하세요');return;}
  const field=channel==='retail'?'visible_retail':'visible_wholesale';
  targets.forEach(p=>{
    const params={action:'updateProduct',sheet:p._sheet,id:p.customer_id};
    params[field]=val;
    api(params).then(()=>showToast(`✓ ${channel==='retail'?'소매':'도매'} ${val==='Y'?'노출':'숨김'} 처리`));
  });
}

function searchBatchPrice(){
  const targets=searchResults.filter(p=>p.selected);
  if(!targets.length){showToast('제품을 먼저 선택하세요');return;}
  const val=prompt('새 소비자가 입력');
  if(!val)return;
  targets.forEach(p=>{
    api({action:'updateProduct',sheet:p._sheet,id:p.customer_id,sale_price:val})
      .then(()=>showToast('✓ 가격 수정 완료'));
  });
}

// ================================
// 카탈로그
// ================================
let currentCatalogChannel='retail';

function selectCatalogChannel(channel){
  currentCatalogChannel=channel;
  const rBtn=document.getElementById('catalog-retail-btn');
  const wBtn=document.getElementById('catalog-wholesale-btn');
  if(channel==='retail'){
    rBtn.style.cssText='flex:1;padding:9px;font-size:13px;font-weight:700;border:none;border-radius:var(--radius-sm);background:var(--gold);color:#fff;cursor:pointer';
    wBtn.style.cssText='flex:1;padding:9px;font-size:13px;font-weight:700;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--panel);color:var(--text2);cursor:pointer';
  } else {
    wBtn.style.cssText='flex:1;padding:9px;font-size:13px;font-weight:700;border:none;border-radius:var(--radius-sm);background:#1A3A6B;color:#fff;cursor:pointer';
    rBtn.style.cssText='flex:1;padding:9px;font-size:13px;font-weight:700;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--panel);color:var(--text2);cursor:pointer';
  }
  loadCatalog();
}

function selectCatalogSheet(el,sheet){
  document.querySelectorAll('#view-catalog .sheet-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentCatalogSheet=sheet;
  loadCatalog();
}

function loadCatalog(){
  const el=document.getElementById('catalog-grid');
  el.innerHTML='<div class="loading-state">불러오는 중...</div>';
  api({action:'getAll',sheet:currentCatalogSheet}).then(data=>{
    if(data.status==='ok'){
      const visField=currentCatalogChannel==='retail'?'visible_retail':'visible_wholesale';
      const items=data.data.filter(p=>p[visField]==='Y');
      renderCatalogItems(items);
    }
  });
}

function renderCatalog(){loadCatalog();}

function renderCatalogItems(items){
  const el=document.getElementById('catalog-grid');
  const priceType=document.getElementById('catalog-price-type').value;
  if(!items.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">💍</div>노출중인 제품이 없습니다</div>';return;}
  el.innerHTML=items.map(p=>{
    let price=0;
    if(priceType==='auto'){
      price=currentCatalogChannel==='retail'?(p.sale_price||0):(p.wholesale_price||p.sale_price||0);
    } else if(priceType==='sale_price'){
      price=p.sale_price||0;
    } else if(priceType==='wholesale_price'){
      price=p.wholesale_price||0;
    }
    return `
    <div class="catalog-item">
      <input type="checkbox" class="catalog-check" checked />
      <div class="catalog-img">${p.photo?`<img src="${p.photo}" alt="" onerror="this.parentElement.innerHTML='💍'">`:'💍'}</div>
      <div class="catalog-body">
        <div class="catalog-id">No. ${p.customer_id}</div>
        <div class="catalog-cat">${p.category||''} ${p.main_stone?'— '+p.main_stone:''}</div>
        ${priceType!=='none'?`<div class="catalog-price">₩${Number(price).toLocaleString()}</div>`:''}
        ${p.description?`<div class="catalog-note">${p.description}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function exportCatalog(){
  showToast('PDF 저장 기능 준비 중...');
